# Mission Control k8s provisioner — scoped RBAC (NOT cluster-admin).
# MC drives `kubectl` with this ServiceAccount's kubeconfig to provision tenants:
#   Namespace + ResourceQuota + LimitRange + egress NetworkPolicy + Secret + OpenClawInstance,
# and to read OpenClawInstance .status.phase. Nothing more.
#
# Apply:   kubectl apply -f ops/k8s-provisioner-rbac.yaml
# Verify:  kubectl auth can-i --list --as=system:serviceaccount:mission-control:mc-provisioner
apiVersion: v1
kind: Namespace
metadata:
  name: mission-control
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mc-provisioner
  namespace: mission-control
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mc-provisioner
# SECURITY FOLLOW-UP (issue: scope secrets to per-tenant Role):
#   These namespaced resources are granted cluster-wide via the ClusterRoleBinding
#   below, so `secrets get` reaches every namespace (kube-system etc.) — a hop to
#   cluster-admin if the MC host token leaks. `list` is dropped here to remove the
#   bulk-dump vector, but the proper fix before production is: keep ONLY `namespaces`
#   + `rolebindings create` + `bind` on this ClusterRole at cluster scope, and have
#   MC create a per-tenant RoleBinding (mc-provisioner -> user-<slug>) at bootstrap,
#   confining secrets/quota/limitrange/NP/instance access to tenant namespaces only.
rules:
  # tenant namespaces are cluster-scoped objects MC creates/deletes
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "delete"]
  # scaffolding MC applies into each tenant namespace (no `list` — apply only needs get)
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges", "secrets"]
    verbs: ["create", "get", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "update", "patch", "delete"]
  # the OpenClaw instance CR + its status (read .status.phase for projection)
  - apiGroups: ["openclaw.rocks"]
    resources: ["openclawinstances"]
    verbs: ["create", "get", "update", "patch", "delete"]
  - apiGroups: ["openclaw.rocks"]
    resources: ["openclawinstances/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mc-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mc-provisioner
subjects:
  - kind: ServiceAccount
    name: mc-provisioner
    namespace: mission-control
---
# Long-lived token for the MC app host (runs outside the cluster).
# k8s >=1.24 does not auto-create SA token secrets; this requests one explicitly.
apiVersion: v1
kind: Secret
metadata:
  name: mc-provisioner-token
  namespace: mission-control
  annotations:
    kubernetes.io/service-account.name: mc-provisioner
type: kubernetes.io/service-account-token
